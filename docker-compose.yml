version: '3.5'
services:
#   app:
#     build: 
#       context: .
#     volumes:
#       - .:/my-app

  frontend:
    image: "rishabh123456/spe_react123"
    ports:
      - "3000:3000"
    container_name: frontend_container1
    command: npm start

  backend:
    image: "rishabh123456/spe_spring"
    ports:
      - "8000:8080"
    container_name: backend_container_sql1
    restart: on-failure
    environment:
      - MYSQL_HOST=mydb
      - MYSQL_PORT=3306
    depends_on:
      - mydb

  mydb:
    image: "mysql:latest"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data4:/var/lib/mysql
    container_name: database_container
    environment:
      - MYSQL_ROOT_PASSWORD=rishabh123#
      - MYSQL_DATABASE=finalproject
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rishabh123#

volumes:
  mysql-data4:
